<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDCRAFT · 图像编辑工作台 (Edit Studio)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* 核心设计系统 */
:root {
  --bg: #1e1e24; /* 背景稍微偏灰，类似专业修图软件的底色 */
  --bg-panel: #2a2a35; --bg-card: #323240;
  --border: #3e3e4e; --border-active: #6c47ff;
  --accent: #6c47ff; --accent-soft: rgba(108, 71, 255, 0.2);
  --text: #ffffff; --text-2: #b0b0c0; --text-3: #707080;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-weight: 300; }

/* 顶部导航 */
.topbar { height: 50px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; position: relative; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.15em; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
.logo span { color: var(--accent); }
.top-actions { display: flex; gap: 12px; align-items: center; }
.btn-export { font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 16px; border-radius: 6px; background: var(--accent); color: #fff; border: none; cursor: pointer; transition: background 0.2s; }
.btn-export:hover { background: #7b5aff; }

/* 主体布局 */
.workspace { display: flex; height: calc(100vh - 50px); }

/* 左侧极简工具栏 */
.toolbar { width: 56px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 12px; z-index: 10; flex-shrink: 0; }
.tool-btn { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-2); cursor: pointer; transition: all 0.2s; font-size: 16px; }
.tool-btn:hover { background: var(--bg-card); color: var(--text); }
.tool-btn.active { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
.tool-divider { width: 24px; height: 1px; background: var(--border); margin: 8px 0; }

/* 中间编辑画布区 */
.canvas-area { flex: 1; background-color: #1a1a20; background-image: 
    linear-gradient(45deg, #22222a 25%, transparent 25%), 
    linear-gradient(-45deg, #22222a 25%, transparent 25%), 
    linear-gradient(45deg, transparent 75%, #22222a 75%), 
    linear-gradient(-45deg, transparent 75%, #22222a 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    
.edit-container { position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
.edit-img { max-width: 800px; max-height: 80vh; display: block; }
/* 模拟局部重绘的选区遮罩 */
.mask-overlay { position: absolute; inset: 0; pointer-events: none; }
.mask-path { position: absolute; top: 30%; left: 40%; width: 150px; height: 120px; background: rgba(108,71,255,0.4); border: 2px dashed var(--accent); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; animation: morph 4s ease-in-out infinite alternate; pointer-events: auto; cursor: move; }
@keyframes morph { 0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; } 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; } }

/* 右侧属性控制台 */
.sidebar-right { width: 320px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
.panel-header { padding: 16px 20px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

.prop-group { display: flex; flex-direction: column; gap: 8px; }
.prop-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); text-transform: uppercase; }
.prop-textarea { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: 'Noto Sans SC', sans-serif; font-size: 12px; color: var(--text); outline: none; resize: vertical; min-height: 80px; }
.prop-textarea:focus { border-color: var(--accent); }

/* 操作项列表 */
.action-list { display: flex; flex-direction: column; gap: 8px; }
.action-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
.action-item:hover { border-color: var(--text-3); background: #3a3a4a; }
.action-item.active { border-color: var(--accent); background: var(--accent-soft); }
.action-info { display: flex; flex-direction: column; gap: 4px; }
.action-title { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text); }
.action-desc { font-size: 10px; color: var(--text-2); }

.btn-apply { margin-top: auto; padding: 14px; border-radius: 8px; background: var(--text); color: #000; border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.btn-apply:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(255,255,255,0.2); }

</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">
    <svg width="16" height="16" viewBox="0 0 28 28" fill="none"><polygon points="14,2 26,8 26,20 14,26 2,20 2,8" stroke="#6c47ff" stroke-width="2" fill="rgba(108,71,255,0.2)"/></svg>
    VOID<span>CRAFT</span>
  </a>
  <div style="font-family:'DM Mono'; font-size:11px; color:var(--text-3);">untitled_edit_01.webp 1024x1024</div>
  <div class="top-actions">
    <button class="btn-export">Export Image ↓</button>
  </div>
</div>

<div class="workspace">
  <div class="toolbar">
    <div class="tool-btn" title="选择/移动">⇱</div>
    <div class="tool-divider"></div>
    <div class="tool-btn active" title="局部重绘 (Inpaint)">🖌️</div>
    <div class="tool-btn" title="智能扩图 (Outpaint)">◰</div>
    <div class="tool-btn" title="背景消除 (Remove BG)">✂️</div>
    <div class="tool-divider"></div>
    <div class="tool-btn" title="撤销">↩</div>
    <div class="tool-btn" title="重做">↪</div>
  </div>

  <div class="canvas-area">
    <div class="edit-container">
      <img src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?q=80&w=800&auto=format&fit=crop" class="edit-img" alt="Editing Image">
      <div class="mask-overlay">
        <div class="mask-path" title="Inpaint Mask Area"></div>
      </div>
    </div>
  </div>

  <div class="sidebar-right">
    <div class="panel-header">
      <span>AI Inpaint (局部重绘)</span>
      <span style="color:var(--accent);">Active</span>
    </div>
    <div class="panel-body">
      
      <div class="prop-group">
        <span class="prop-label">重绘提示词 Prompt</span>
        <textarea class="prop-textarea" placeholder="描述你想在遮罩区域生成的内容...">将这部分替换为发光的赛博朋克全息投影仪，细节丰富，完美融合背景光影。</textarea>
      </div>

      <div class="prop-group" style="margin-top:8px;">
        <span class="prop-label">一键处理预设 (Quick Actions)</span>
        <div class="action-list">
          <div class="action-item active">
            <div class="action-info">
              <span class="action-title">High-res Fix</span>
              <span class="action-desc">在重绘时保持源图像的高分辨率纹理</span>
            </div>
            <span style="color:var(--accent);">✓</span>
          </div>
          <div class="action-item">
            <div class="action-info">
              <span class="action-title">Match Lighting</span>
              <span class="action-desc">AI 自动匹配原图光影方向 (ControlNet)</span>
            </div>
          </div>
        </div>
      </div>

      <div class="prop-group" style="margin-top:8px;">
        <span class="prop-label">Denoising Strength (重绘幅度)</span>
        <div style="display:flex; align-items:center; gap:10px;">
          <input type="range" min="0" max="1" step="0.05" value="0.75" style="flex:1; height:2px; background:var(--border); -webkit-appearance:none; border-radius:2px; outline:none;" id="denoise-slider" oninput="document.getElementById('denoise-val').innerText=this.value">
          <span id="denoise-val" style="font-family:'DM Mono'; font-size:11px; color:var(--text); width:24px;">0.75</span>
        </div>
      </div>

      <button class="btn-apply" onclick="applyEdit(this)">Apply Changes (执行修改)</button>
    </div>
  </div>
</div>

<script>
  function applyEdit(btn) {
    btn.innerText = 'Processing...';
    btn.style.background = 'var(--text-3)';
    btn.style.color = '#fff';
    setTimeout(() => {
      btn.innerText = 'Apply Changes (执行修改)';
      btn.style.background = 'var(--text)';
      btn.style.color = '#000';
      // 简单模拟遮罩闪烁效果代表完成
      const mask = document.querySelector('.mask-path');
      mask.style.background = 'rgba(0, 245, 196, 0.4)';
      mask.style.borderColor = '#00f5c4';
      setTimeout(() => {
        mask.style.background = 'rgba(108,71,255,0.4)';
        mask.style.borderColor = 'var(--accent)';
      }, 500);
    }, 2000);
  }

  // 工具栏点击切换高亮
  const tools = document.querySelectorAll('.tool-btn');
  tools.forEach(tool => {
    tool.addEventListener('click', () => {
      if(tool.innerText === '↩' || tool.innerText === '↪') return;
      tools.forEach(t => t.classList.remove('active'));
      tool.classList.add('active');
    });
  });
</script>
</body>
</html>
